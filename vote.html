<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoproGest — Votes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--navy:#0a0f1e;--card:#141d30;--card2:#1a2540;--border:rgba(99,130,255,.15);--accent:#5b7fff;--accent2:#7c5cfc;--accent3:#38d9a9;--text:#e8eaf6;--muted:#8892b0;--danger:#ff6b6b;--gold:#ffd166;--green:#38d9a9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;z-index:50;}
.sidebar-logo{display:flex;align-items:center;gap:.7rem;padding:0 1.5rem 1.5rem;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;text-decoration:none;color:var(--text);}
.sidebar-logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nav-section-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.8rem 1.5rem .4rem;margin-top:.5rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.5rem;color:var(--muted);cursor:pointer;font-size:.88rem;transition:all .2s;border-left:2px solid transparent;text-decoration:none;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--text);background:rgba(91,127,255,.1);border-left-color:var(--accent);}
.nav-icon{font-size:1.1rem;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
.user-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;}
.user-details strong{display:block;font-size:.85rem;font-weight:600;}
.user-details small{color:var(--muted);font-size:.72rem;}
.btn-logout{width:100%;padding:.6rem;border-radius:8px;border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08);color:#ff9999;font-family:'DM Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-logout:hover{background:rgba(255,107,107,.15);}

/* ── MAIN ── */
.main{margin-left:240px;padding:2rem 2.5rem;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header-left h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;}
.page-header-left p{color:var(--muted);font-size:.92rem;margin-top:.3rem;}

/* ── BOUTON CRÉER (syndic seulement) ── */
.btn-create{display:none;align-items:center;gap:.6rem;padding:.75rem 1.4rem;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(91,127,255,.35);}
.btn-create:hover{opacity:.9;transform:translateY(-1px);}
.btn-create.visible{display:flex;}

/* ── FILTRES ── */
.filters{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.filter-btn{padding:.45rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;}
.filter-btn:hover{border-color:rgba(91,127,255,.4);color:var(--text);}
.filter-btn.active{border-color:var(--accent);background:rgba(91,127,255,.12);color:var(--accent);}

/* ── STATS RAPIDES ── */
.vote-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.vstat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center;}
.vstat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;}
.vstat-lbl{color:var(--muted);font-size:.78rem;margin-top:.2rem;}

/* ── GRILLE VOTES ── */
.votes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.5rem;}
.vote-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.6rem;transition:transform .2s,border-color .2s;animation:fadeUp .4s ease both;}
.vote-card:hover{transform:translateY(-3px);border-color:rgba(91,127,255,.3);}

/* Status badge */
.vote-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1rem;}
.status-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:20px;font-size:.72rem;font-weight:600;flex-shrink:0;}
.badge-open{background:rgba(56,217,169,.15);color:var(--green);}
.badge-closed{background:rgba(136,146,176,.15);color:var(--muted);}
.badge-pending{background:rgba(255,209,102,.15);color:var(--gold);}

.vote-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.4rem;line-height:1.4;}
.vote-desc{color:var(--muted);font-size:.84rem;line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* Tantièmes */
.tantieme-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(91,127,255,.1);border:1px solid rgba(91,127,255,.2);border-radius:6px;padding:.25rem .6rem;font-size:.75rem;color:var(--accent);margin-bottom:1rem;}

/* Barres de résultats */
.results{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.2rem;}
.result-row{display:flex;flex-direction:column;gap:.3rem;}
.result-top{display:flex;justify-content:space-between;font-size:.8rem;}
.result-label{font-weight:500;}
.result-pct{color:var(--muted);}
.result-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;}
.result-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.22,1,.36,1);}
.fill-pour{background:linear-gradient(90deg,var(--accent3),#2fb898);}
.fill-contre{background:linear-gradient(90deg,var(--danger),#e05050);}
.fill-abstention{background:linear-gradient(90deg,var(--gold),#e6b840);}

/* Footer carte */
.vote-footer{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--border);flex-wrap:wrap;gap:.5rem;}
.vote-meta{font-size:.76rem;color:var(--muted);}
.vote-meta span{display:block;}

/* Boutons voter */
.btn-vote-group{display:flex;gap:.5rem;}
.btn-vote{padding:.45rem .9rem;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-vote:hover{transform:translateY(-1px);}
.btn-vote.pour:hover,.btn-vote.pour.voted{border-color:var(--accent3);background:rgba(56,217,169,.15);color:var(--accent3);}
.btn-vote.contre:hover,.btn-vote.contre.voted{border-color:var(--danger);background:rgba(255,107,107,.15);color:var(--danger);}
.btn-vote.abstention:hover,.btn-vote.abstention.voted{border-color:var(--gold);background:rgba(255,209,102,.15);color:var(--gold);}
.btn-vote:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-delete{padding:.45rem .7rem;border-radius:8px;border:1px solid rgba(255,107,107,.2);background:transparent;color:var(--danger);font-size:.8rem;cursor:pointer;transition:all .2s;display:none;}
.btn-delete:hover{background:rgba(255,107,107,.1);}
.btn-delete.visible{display:block;}

/* Déjà voté badge */
.voted-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;color:var(--accent3);background:rgba(56,217,169,.1);padding:.3rem .7rem;border-radius:20px;}

/* Empty state */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5;}
.empty-state h3{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:.5rem;}

/* ── MODAL CRÉER VOTE ── */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:1rem;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.modal-header h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;transition:color .2s;}
.modal-close:hover{color:var(--text);}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.form-label{font-size:.76rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.form-input,.form-textarea,.form-select{width:100%;padding:.8rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted);}
.form-textarea{resize:vertical;min-height:90px;}
.form-select option{background:var(--card2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn-submit{width:100%;padding:.88rem;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:opacity .2s;box-shadow:0 4px 16px rgba(91,127,255,.3);}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* ── LOADING ── */
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{color:var(--muted);font-size:.9rem;}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;right:2rem;z-index:1000;background:var(--card2);border:1px solid var(--border);border-left:4px solid var(--accent3);border-radius:12px;padding:1rem 1.4rem;font-size:.88rem;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,.4);transform:translateX(120%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-width:320px;}
.toast.show{transform:translateX(0);}
.toast.error{border-left-color:var(--danger);}

@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;padding:1.5rem;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-screen" id="ls"><div class="loading-spinner"></div><div class="loading-text">Chargement des votes...</div></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar" style="display:none"></aside>

<!-- MAIN -->
<main class="main" id="mainContent" style="display:none">
  <div class="page-header">
    <div class="page-header-left">
      <h1>🗳️ Votes & Résolutions</h1>
      <p>Participez aux décisions de votre copropriété</p>
    </div>
    <button class="btn-create" id="btnCreate" onclick="openModal()">+ Créer un vote</button>
  </div>

  <!-- Stats rapides -->
  <div class="vote-stats">
    <div class="vstat"><div class="vstat-val" id="statTotal">0</div><div class="vstat-lbl">Total votes</div></div>
    <div class="vstat"><div class="vstat-val" style="color:var(--accent3)" id="statOpen">0</div><div class="vstat-lbl">En cours</div></div>
    <div class="vstat"><div class="vstat-val" style="color:var(--muted)" id="statClosed">0</div><div class="vstat-lbl">Clôturés</div></div>
    <div class="vstat"><div class="vstat-val" style="color:var(--gold)" id="statMine">0</div><div class="vstat-lbl">Mes votes</div></div>
  </div>

  <!-- Filtres -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('open',this)">En cours</button>
    <button class="filter-btn" onclick="setFilter('closed',this)">Clôturés</button>
    <button class="filter-btn" onclick="setFilter('mine',this)">Mes votes</button>
  </div>

  <!-- Grille votes -->
  <div class="votes-grid" id="votesGrid">
    <div class="empty-state"><div class="empty-icon">🗳️</div><h3>Aucun vote pour l'instant</h3><p>Le Syndic peut créer le premier vote.</p></div>
  </div>
</main>

<!-- MODAL CRÉER VOTE (Syndic seulement) -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>🗳️ Créer un vote</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Titre de la résolution *</label>
      <input type="text" class="form-input" id="v-titre" placeholder="Ex : Ravalement de façade bâtiment A">
    </div>
    <div class="form-group">
      <label class="form-label">Description détaillée *</label>
      <textarea class="form-textarea" id="v-desc" placeholder="Décrivez la résolution, le contexte, le montant si applicable..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date de clôture *</label>
        <input type="date" class="form-input" id="v-date">
      </div>
      <div class="form-group">
        <label class="form-label">Tantièmes requis (%)</label>
        <input type="number" class="form-input" id="v-tantieme" placeholder="Ex : 50" min="1" max="100">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Catégorie</label>
      <select class="form-select" id="v-categorie">
        <option value="travaux">🔧 Travaux</option>
        <option value="budget">💰 Budget</option>
        <option value="reglement">📋 Règlement</option>
        <option value="autre">📌 Autre</option>
      </select>
    </div>
    <button class="btn-submit" id="btnSubmit" onclick="createVote()">✅ Publier le vote</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="sidebar.js"></script>
<script src="firebase-config.js"></script>
<script>
let currentUser = null;
let currentProfile = 'locataire';
let allVotes = [];
let currentFilter = 'all';

// ── Auth check ──
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      currentProfile = d.profile || 'locataire';
      const name = d.prenom ? `${d.prenom} ${d.nom||''}` : user.displayName || user.email.split('@')[0];
      buildSidebar(currentProfile||d.profile||'locataire', name, user.email, 'vote.html');
    }
  } catch(e) {}

  // Afficher bouton créer seulement pour le syndic
  if (currentProfile === 'syndic') {
    document.getElementById('btnCreate').classList.add('visible');
  }

  document.getElementById('ls').style.display = 'none';
  document.getElementById('sidebar').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'block';

  // Définir date min pour le datepicker
  document.getElementById('v-date').min = new Date().toISOString().split('T')[0];

  loadVotes();
});

// ── Charger les votes depuis Firestore ──
function loadVotes() {
  db.collection('votes').orderBy('createdAt','desc').onSnapshot(snapshot => {
    allVotes = [];
    snapshot.forEach(doc => allVotes.push({ id: doc.id, ...doc.data() }));
    updateStats();
    renderVotes();
  });
}

// ── Stats ──
function updateStats() {
  const now = new Date();
  const open   = allVotes.filter(v => new Date(v.dateCloture) > now).length;
  const closed = allVotes.filter(v => new Date(v.dateCloture) <= now).length;
  const mine   = allVotes.filter(v => v.votes && v.votes[currentUser.uid]).length;
  document.getElementById('statTotal').textContent  = allVotes.length;
  document.getElementById('statOpen').textContent   = open;
  document.getElementById('statClosed').textContent = closed;
  document.getElementById('statMine').textContent   = mine;
}

// ── Filtres ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderVotes();
}

// ── Render votes ──
function renderVotes() {
  const now = new Date();
  let filtered = allVotes;

  if (currentFilter === 'open')   filtered = allVotes.filter(v => new Date(v.dateCloture) > now);
  if (currentFilter === 'closed') filtered = allVotes.filter(v => new Date(v.dateCloture) <= now);
  if (currentFilter === 'mine')   filtered = allVotes.filter(v => v.votes && v.votes[currentUser.uid]);

  const grid = document.getElementById('votesGrid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🗳️</div><h3>Aucun vote trouvé</h3><p>Aucun vote ne correspond à ce filtre.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((v,i) => {
    const isOpen    = new Date(v.dateCloture) > now;
    const myVote    = v.votes ? v.votes[currentUser.uid] : null;
    const totalVotes = v.votes ? Object.keys(v.votes).length : 0;
    const pour      = v.votes ? Object.values(v.votes).filter(x=>x==='pour').length : 0;
    const contre    = v.votes ? Object.values(v.votes).filter(x=>x==='contre').length : 0;
    const abst      = v.votes ? Object.values(v.votes).filter(x=>x==='abstention').length : 0;
    const pPour     = totalVotes ? Math.round(pour/totalVotes*100) : 0;
    const pContre   = totalVotes ? Math.round(contre/totalVotes*100) : 0;
    const pAbst     = totalVotes ? Math.round(abst/totalVotes*100) : 0;
    const isSyndic  = currentProfile === 'syndic';
    const catIcons  = {travaux:'🔧',budget:'💰',reglement:'📋',autre:'📌'};

    const dateStr = new Date(v.dateCloture).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
    const statusBadge = isOpen
      ? `<span class="status-badge badge-open">● En cours</span>`
      : `<span class="status-badge badge-closed">● Clôturé</span>`;

    const voteButtons = isOpen && !myVote
      ? `<div class="btn-vote-group">
          <button class="btn-vote pour" onclick="castVote('${v.id}','pour')">👍 Pour</button>
          <button class="btn-vote contre" onclick="castVote('${v.id}','contre')">👎 Contre</button>
          <button class="btn-vote abstention" onclick="castVote('${v.id}','abstention')">✋ Abstention</button>
        </div>`
      : myVote
        ? `<div class="voted-badge">✅ Voté : ${myVote.charAt(0).toUpperCase()+myVote.slice(1)}</div>`
        : `<div class="voted-badge" style="color:var(--muted);background:rgba(136,146,176,.1)">🔒 Vote clôturé</div>`;

    const deleteBtn = isSyndic
      ? `<button class="btn-delete visible" onclick="deleteVote('${v.id}')">🗑️</button>`
      : '';

    return `<div class="vote-card" style="animation-delay:${i*0.07}s">
      <div class="vote-header">
        <div>
          <div style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">${catIcons[v.categorie]||'📌'} ${(v.categorie||'autre').charAt(0).toUpperCase()+(v.categorie||'autre').slice(1)}</div>
          <div class="vote-title">${v.titre}</div>
        </div>
        ${statusBadge}
      </div>
      <div class="vote-desc">${v.description}</div>
      ${v.tantieme ? `<div class="tantieme-badge">⚖️ Majorité requise : ${v.tantieme}% des tantièmes</div>` : ''}
      <div class="results">
        <div class="result-row">
          <div class="result-top"><span class="result-label">👍 Pour</span><span class="result-pct">${pour} vote${pour>1?'s':''} · ${pPour}%</span></div>
          <div class="result-bar"><div class="result-fill fill-pour" style="width:${pPour}%"></div></div>
        </div>
        <div class="result-row">
          <div class="result-top"><span class="result-label">👎 Contre</span><span class="result-pct">${contre} vote${contre>1?'s':''} · ${pContre}%</span></div>
          <div class="result-bar"><div class="result-fill fill-contre" style="width:${pContre}%"></div></div>
        </div>
        <div class="result-row">
          <div class="result-top"><span class="result-label">✋ Abstention</span><span class="result-pct">${abst} vote${abst>1?'s':''} · ${pAbst}%</span></div>
          <div class="result-bar"><div class="result-fill fill-abstention" style="width:${pAbst}%"></div></div>
        </div>
      </div>
      <div class="vote-footer">
        <div class="vote-meta">
          <span>📅 Clôture : ${dateStr}</span>
          <span>👥 ${totalVotes} participant${totalVotes>1?'s':''}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          ${voteButtons}
          ${deleteBtn}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Voter ──
async function castVote(voteId, choix) {
  try {
    await db.collection('votes').doc(voteId).update({
      [`votes.${currentUser.uid}`]: choix
    });
    showToast(`✅ Vote enregistré : ${choix.charAt(0).toUpperCase()+choix.slice(1)}`);
  } catch(e) {
    showToast('❌ Erreur lors du vote', true);
  }
}

// ── Créer un vote (Syndic) ──
async function createVote() {
  const titre    = document.getElementById('v-titre').value.trim();
  const desc     = document.getElementById('v-desc').value.trim();
  const date     = document.getElementById('v-date').value;
  const tantieme = document.getElementById('v-tantieme').value;
  const cat      = document.getElementById('v-categorie').value;

  if (!titre || !desc || !date) {
    showToast('⚠️ Remplissez tous les champs obligatoires (*)', true);
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Publication...';

  try {
    await db.collection('votes').add({
      titre, description: desc,
      dateCloture: date,
      tantieme: tantieme || null,
      categorie: cat,
      createdBy: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      votes: {}
    });
    closeModal();
    showToast('✅ Vote publié avec succès !');
    // Reset form
    ['v-titre','v-desc','v-date','v-tantieme'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    showToast('❌ Erreur lors de la création', true);
  } finally {
    btn.disabled = false;
    btn.textContent = '✅ Publier le vote';
  }
}

// ── Supprimer un vote (Syndic) ──
async function deleteVote(voteId) {
  if (!confirm('Supprimer ce vote définitivement ?')) return;
  try {
    await db.collection('votes').doc(voteId).delete();
    showToast('🗑️ Vote supprimé.');
  } catch(e) {
    showToast('❌ Erreur lors de la suppression', true);
  }
}

// ── Modal ──
function openModal()  { document.getElementById('createModal').classList.add('show'); }
function closeModal() { document.getElementById('createModal').classList.remove('show'); }

// ── Déconnexion ──
async function handleLogout() {
  await auth.signOut();
  window.location.href = 'login.html';
}

// ── Toast ──
let toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
