<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoproGest — Lots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#0044a0;--card:#00368a;--card2:#004aab;--card3:#0055b3;
  --accent:#00d4aa;--accent2:#00b4d8;--accent3:#00d4aa;--accent4:#7dd3fc;
  --border:rgba(255,255,255,.12);--border2:rgba(0,180,216,.15);--border-hover:rgba(0,212,170,.5);
  --text:#ffffff;--text2:#e2f0ff;--muted:#b8d4f8;--muted2:#98c4f0;
  --danger:#f87171;--gold:#fbbf24;--success:#34d399;--purple:#a78bfa;
  --grad-main:linear-gradient(135deg,#00d4aa,#00b4d8);
  --grad-accent:linear-gradient(135deg,#00d4aa 0%,#0ea5e9 100%);
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --shadow-accent:0 4px 20px rgba(0,212,170,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;z-index:50;}
.sidebar-logo{display:flex;align-items:center;gap:.7rem;padding:0 1.5rem 1.5rem;border-bottom:1px solid var(--border);font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.15rem;text-decoration:none;color:var(--text);}
.sidebar-logo-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#00d4aa,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.nav-section-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.8rem 1.5rem .4rem;margin-top:.5rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.5rem;color:var(--muted);font-size:.88rem;transition:all .2s;border-left:2px solid transparent;text-decoration:none;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--text);background:rgba(255,255,255,.06);border-left-color:var(--accent);}
.nav-icon{font-size:1.1rem;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
.user-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#00d4aa,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;}
.user-details strong{display:block;font-size:.85rem;font-weight:600;}
.user-details small{color:var(--muted);font-size:.72rem;}
.btn-logout{width:100%;padding:.6rem;border-radius:8px;border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08);color:#ff9999;font-family:'Plus Jakarta Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-logout:hover{background:rgba(255,107,107,.15);}
.main{margin-left:240px;padding:2rem 2.5rem;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header h1{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.6rem;}
.page-header p{color:var(--muted);font-size:.92rem;margin-top:.3rem;}
.btn-create{display:none;align-items:center;gap:.6rem;padding:.75rem 1.4rem;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4aa,#0ea5e9);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;transition:opacity .2s,transform .15s;box-shadow:0 4px 16px rgba(255,255,255,.12);}
.btn-create:hover{opacity:.9;transform:translateY(-1px);}
.btn-create.visible{display:flex;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:800;}
.stat-lbl{color:var(--muted);font-size:.78rem;margin-top:.2rem;}
.toolbar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}
.search-input{width:100%;padding:.7rem 1rem .7rem 2.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;transition:border-color .2s;}
.search-input:focus{outline:none;border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.filter-btn{padding:.5rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;}
.filter-btn:hover{border-color:rgba(91,127,255,.4);color:var(--text);}
.filter-btn.active{border-color:var(--accent);background:rgba(255,255,255,.07);color:var(--accent);}
/* LOTS GRID */
.lots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
.lot-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;transition:transform .2s,border-color .2s;animation:fadeUp .35s ease both;}
.lot-card:hover{transform:translateY(-3px);border-color:rgba(0,212,170,.3);}
.lot-num{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.4rem;color:var(--accent);margin-bottom:.3rem;}
.lot-type{font-size:.78rem;color:var(--muted);margin-bottom:1rem;}
.lot-info{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.lot-info-row{display:flex;justify-content:space-between;font-size:.83rem;}
.lot-info-row span:first-child{color:var(--muted);}
.lot-status{display:inline-flex;align-items:center;gap:.35rem;padding:.28rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;}
.status-occupe{background:rgba(56,217,169,.12);color:var(--accent3);}
.status-libre{background:rgba(255,209,102,.12);color:var(--gold);}
.lot-footer{display:flex;justify-content:space-between;align-items:center;padding-top:.9rem;border-top:1px solid var(--border);}
.btn-edit{padding:.4rem .9rem;border-radius:7px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
.btn-edit:hover{border-color:var(--accent);color:var(--accent);}
.btn-del{padding:.4rem .7rem;border-radius:7px;border:1px solid rgba(255,107,107,.2);background:transparent;color:var(--danger);font-size:.78rem;cursor:pointer;transition:all .2s;}
.btn-del:hover{background:rgba(255,107,107,.1);}
/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.empty-state h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:.5rem;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:1rem;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.modal-header h2{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.15rem;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.form-label{font-size:.75rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.form-input,.form-select{width:100%;padding:.8rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;transition:border-color .2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
.form-select option{background:var(--card2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.ferr{color:var(--danger);font-size:.74rem;display:none;}
.ferr.show{display:block;}
.btn-submit{width:100%;padding:.88rem;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4aa,#0ea5e9);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem;}
.loading-spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{color:var(--muted);font-size:.9rem;}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:1000;background:var(--card2);border:1px solid var(--border);border-left:4px solid var(--accent3);border-radius:12px;padding:1rem 1.4rem;font-size:.88rem;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,.4);transform:translateX(120%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-width:320px;}
.toast.show{transform:translateX(0);}
.toast.error{border-left-color:var(--danger);}
@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;padding:1.5rem;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loading-screen" id="ls"><div class="loading-spinner"></div><div class="loading-text">Chargement...</div></div>

<aside class="sidebar" id="sidebar" style="display:none"></aside>

<main class="main" id="mainContent" style="display:none">
  <div class="page-header">
    <div><h1>🏢 Immeubles & Lots</h1><p>Gestion du parc immobilier de la copropriété</p></div>
    <button class="btn-create" id="btnCreate" onclick="openModal('lotModal')">+ Nouveau lot</button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-val" id="stTotal">0</div><div class="stat-lbl">Total lots</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent3)" id="stOccupe">0</div><div class="stat-lbl">Occupés</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)" id="stLibre">0</div><div class="stat-lbl">Vacants</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)" id="stTantieme">0</div><div class="stat-lbl">Total tantièmes</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un lot..." oninput="renderLots()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('Appartement',this)">Appartements</button>
    <button class="filter-btn" onclick="setFilter('Parking',this)">Parkings</button>
    <button class="filter-btn" onclick="setFilter('occupe',this)">Occupés</button>
    <button class="filter-btn" onclick="setFilter('libre',this)">Vacants</button>
  </div>
  <div class="lots-grid" id="lotsGrid"></div>
</main>

<!-- MODAL LOT -->
<div class="modal-overlay" id="lotModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="lotModalTitle">🏢 Nouveau lot</h2>
      <button class="modal-close" onclick="closeModal('lotModal')">✕</button>
    </div>
    <input type="hidden" id="lot-id">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">N° Lot *</label>
        <input type="text" class="form-input" id="l-numero" placeholder="A012">
        <span class="ferr" id="e-lnum">Champ requis</span>
      </div>
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-select" id="l-type">
          <option>Appartement</option><option>Parking</option><option>Cave</option><option>Local commercial</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Bâtiment</label>
        <input type="text" class="form-input" id="l-bat" placeholder="A">
      </div>
      <div class="form-group">
        <label class="form-label">Étage</label>
        <input type="number" class="form-input" id="l-etage" placeholder="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Surface (m²)</label>
        <input type="number" class="form-input" id="l-surface" placeholder="68" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">Tantièmes</label>
        <input type="number" class="form-input" id="l-tantieme" placeholder="250">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Propriétaire</label>
      <input type="text" class="form-input" id="l-proprio" placeholder="Nom du propriétaire">
    </div>
    <div class="form-group">
      <label class="form-label">Locataire actuel</label>
      <input type="text" class="form-input" id="l-locataire" placeholder="Nom du locataire (si occupé)">
    </div>
    <button class="btn-submit" id="btnLot" onclick="saveLot()">✅ Créer le lot</button>
  </div>
</div>

<!-- MODAL TRANSFERT DE LOT -->
<div class="modal-overlay" id="transfertModal">
  <div class="modal-box" style="max-width:520px">
    <div class="modal-header">
      <h2>🔄 Transfert de lot</h2>
      <button class="modal-close" onclick="closeModal('transfertModal')">✕</button>
    </div>
    <input type="hidden" id="t-lotId">

    <!-- Lot concerné -->
    <div style="background:rgba(56,217,169,.08);border:1px solid rgba(56,217,169,.2);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1.2rem">
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent3);margin-bottom:.3rem">Lot concerné</div>
      <div id="t-lotInfo" style="font-size:.95rem;font-weight:600;color:var(--text)">—</div>
      <div id="t-lotProprioActuel" style="font-size:.84rem;color:var(--muted);margin-top:.2rem">—</div>
    </div>

    <!-- Ancien propriétaire -->
    <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.6rem">Étape 1 — Ancien propriétaire</div>
    <div class="form-group">
      <label class="form-label">Action sur l'ancien propriétaire</label>
      <select class="form-select" id="t-actionAncien" onchange="toggleAncienOptions()">
        <option value="garder">Garder son compte (il reste résident)</option>
        <option value="supprimer">Supprimer son compte de la copropriété</option>
      </select>
    </div>

    <div style="height:1px;background:var(--border);margin:1rem 0"></div>

    <!-- Nouveau propriétaire -->
    <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.6rem">Étape 2 — Nouveau propriétaire</div>
    <div class="form-group">
      <label class="form-label">Le nouveau propriétaire est :</label>
      <select class="form-select" id="t-typeNouveau" onchange="toggleNouveauOptions()">
        <option value="existant">Un résident existant dans la copropriété</option>
        <option value="nouveau">Une nouvelle personne (créer un compte)</option>
      </select>
    </div>

    <!-- Si résident existant -->
    <div id="t-existantSection">
      <div class="form-group">
        <label class="form-label">Sélectionner le résident *</label>
        <select class="form-select" id="t-residentsSelect">
          <option value="">-- Choisir un résident --</option>
        </select>
      </div>
    </div>

    <!-- Si nouveau -->
    <div id="t-nouveauSection" style="display:none">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="t-prenom" placeholder="Jean">
        </div>
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="t-nom" placeholder="Dupont">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="t-email" placeholder="jean@exemple.fr">
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input type="tel" class="form-input" id="t-tel" placeholder="+253 77 XX XX XX">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe temporaire *</label>
        <input type="text" class="form-input" id="t-pwd" value="Copro2026!">
      </div>
    </div>

    <div style="height:1px;background:var(--border);margin:1rem 0"></div>

    <div class="form-group">
      <label class="form-label">Date de transfert</label>
      <input type="date" class="form-input" id="t-date">
    </div>

    <button class="btn-submit" id="btnTransfert" onclick="executerTransfert()">🔄 Confirmer le transfert</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="sidebar.js"></script>
<script src="firebase-config.js"></script>
<script>
let currentUser=null, currentProfile='locataire', allLots=[], currentFilter='all';

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href='login.html'; return; }
  currentUser = user;
  try {
    const snap = await db.collection('users').doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      currentProfile = d.profile||'locataire';
      const name = d.prenom?`${d.prenom} ${d.nom||''}`.trim():user.displayName||user.email.split('@')[0];
      buildSidebar(currentProfile, name, user.email, 'lots.html');
    }
  } catch(e) {}
  if (currentProfile === 'syndic') document.getElementById('btnCreate').classList.add('visible');
  document.getElementById('ls').style.display='none';
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('mainContent').style.display='block';
  loadLots();
});

function loadLots() {
  db.collection('lots').orderBy('createdAt','desc').onSnapshot(snap => {
    allLots = [];
    snap.forEach(doc => allLots.push({id:doc.id,...doc.data()}));
    updateStats(); renderLots();
  });
}

function updateStats() {
  const occupe = allLots.filter(l=>l.locataire).length;
  document.getElementById('stTotal').textContent    = allLots.length;
  document.getElementById('stOccupe').textContent   = occupe;
  document.getElementById('stLibre').textContent    = allLots.length - occupe;
  document.getElementById('stTantieme').textContent = allLots.reduce((s,l)=>s+(l.tantieme||0),0);
}

function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderLots();
}

function renderLots() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allLots;
  if (currentFilter==='occupe') list=list.filter(l=>l.locataire);
  else if (currentFilter==='libre') list=list.filter(l=>!l.locataire);
  else if (currentFilter!=='all') list=list.filter(l=>l.type===currentFilter);
  if (q) list=list.filter(l=>(l.numero||'').toLowerCase().includes(q)||(l.proprio||'').toLowerCase().includes(q));

  const grid=document.getElementById('lotsGrid');
  const isSyndic = currentProfile === 'syndic';
  if (!list.length) { grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏢</div><h3>Aucun lot trouvé</h3></div>`; return; }

  grid.innerHTML=list.map((l,i)=>`
    <div class="lot-card" style="animation-delay:${i*.06}s">
      <div class="lot-num">${l.numero||'—'}</div>
      <div class="lot-type">${l.type||'Appartement'} · Bât. ${l.batiment||'—'} · Étage ${l.etage??'—'}</div>
      <div class="lot-info">
        <div class="lot-info-row"><span>Surface</span><span>${l.surface||'—'} m²</span></div>
        <div class="lot-info-row"><span>Tantièmes</span><span>${l.tantieme||0}</span></div>
        <div class="lot-info-row"><span>Propriétaire</span><span>${l.proprio||'—'}</span></div>
        <div class="lot-info-row"><span>Locataire</span><span>${l.locataire||'Vacant'}</span></div>
      </div>
      <div class="lot-footer">
        <span class="lot-status ${l.locataire?'status-occupe':'status-libre'}">${l.locataire?'● Occupé':'● Vacant'}</span>
        ${isSyndic?`<div style="display:flex;gap:.4rem;flex-wrap:wrap">
          <button class="btn-edit" onclick="openTransfert('${l.id}')" style="border-color:rgba(56,217,169,.3);color:var(--accent3)">🔄 Transférer</button>
          <button class="btn-edit" onclick="openEdit('${l.id}')">✏️ Modifier</button>
          <button class="btn-del" onclick="deleteLot('${l.id}')">🗑️</button>
        </div>`:''}
      </div>
    </div>`).join('');
}

async function saveLot() {
  const id=document.getElementById('lot-id').value;
  const numero=document.getElementById('l-numero').value.trim();
  if (!numero) { document.getElementById('e-lnum').classList.add('show'); return; }
  document.getElementById('e-lnum').classList.remove('show');
  const data={
    numero, type:document.getElementById('l-type').value,
    batiment:document.getElementById('l-bat').value.trim(),
    etage:parseInt(document.getElementById('l-etage').value)||0,
    surface:parseFloat(document.getElementById('l-surface').value)||0,
    tantieme:parseInt(document.getElementById('l-tantieme').value)||0,
    proprio:document.getElementById('l-proprio').value.trim(),
    locataire:document.getElementById('l-locataire').value.trim(),
  };
  const btn=document.getElementById('btnLot');
  btn.disabled=true; btn.textContent='Enregistrement...';
  try {
    if (id) { await db.collection('lots').doc(id).update(data); showToast('✅ Lot modifié !'); }
    else { await db.collection('lots').add({...data,createdBy:currentUser.uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); showToast('✅ Lot créé !'); }
    closeModal('lotModal');
    ['l-numero','l-bat','l-surface','l-tantieme','l-proprio','l-locataire'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('lot-id').value='';
  } catch(e) { showToast('❌ Erreur',true); }
  finally { btn.disabled=false; btn.textContent='✅ Créer le lot'; }
}

function openEdit(id) {
  const l=allLots.find(x=>x.id===id); if(!l) return;
  document.getElementById('lot-id').value=id;
  document.getElementById('lotModalTitle').textContent='✏️ Modifier le lot';
  document.getElementById('btnLot').textContent='💾 Enregistrer';
  document.getElementById('l-numero').value=l.numero||'';
  document.getElementById('l-type').value=l.type||'Appartement';
  document.getElementById('l-bat').value=l.batiment||'';
  document.getElementById('l-etage').value=l.etage??'';
  document.getElementById('l-surface').value=l.surface||'';
  document.getElementById('l-tantieme').value=l.tantieme||'';
  document.getElementById('l-proprio').value=l.proprio||'';
  document.getElementById('l-locataire').value=l.locataire||'';
  openModal('lotModal');
}

async function deleteLot(id) {
  if (!confirm('Supprimer ce lot ?')) return;
  await db.collection('lots').doc(id).delete();
  showToast('🗑️ Lot supprimé.');
}

// ── Ouvrir modal transfert ──
async function openTransfert(lotId) {
  const lot = allLots.find(l => l.id === lotId);
  if (!lot) return;

  document.getElementById('t-lotId').value    = lotId;
  document.getElementById('t-lotInfo').textContent = `Lot ${lot.numero} — ${lot.type||'Appartement'} Bât.${lot.batiment||'—'} Étage ${lot.etage??'—'} (${lot.surface||'—'} m²)`;
  document.getElementById('t-lotProprioActuel').textContent = `Propriétaire actuel : ${lot.proprio||'Non assigné'}`;
  document.getElementById('t-date').value = new Date().toISOString().slice(0,10);

  // Charger la liste des résidents copropriétaires
  const usersSnap = await db.collection('users').get();
  const residents = usersSnap.docs
    .map(d => ({ uid: d.id, ...d.data() }))
    .filter(u => ['proprietaire','coproprietaire'].includes(u.profile));

  const select = document.getElementById('t-residentsSelect');
  select.innerHTML = '<option value="">-- Choisir un résident --</option>' +
    residents.map(u => `<option value="${u.uid}" data-nom="${u.prenom||''} ${u.nom||''}">${u.prenom||''} ${u.nom||''} (${u.email||''})</option>`).join('');

  openModal('transfertModal');
}

function toggleNouveauOptions() {
  const type = document.getElementById('t-typeNouveau').value;
  document.getElementById('t-existantSection').style.display = type==='existant' ? 'block' : 'none';
  document.getElementById('t-nouveauSection').style.display  = type==='nouveau'  ? 'block' : 'none';
}

function toggleAncienOptions() { /* réservé pour extensions futures */ }

// ── Exécuter le transfert ──
async function executerTransfert() {
  const lotId        = document.getElementById('t-lotId').value;
  const actionAncien = document.getElementById('t-actionAncien').value;
  const typeNouveau  = document.getElementById('t-typeNouveau').value;
  const dateTransfert = document.getElementById('t-date').value;
  const lot          = allLots.find(l => l.id === lotId);

  if (!lot) return;

  const btn = document.getElementById('btnTransfert');
  btn.disabled = true; btn.textContent = 'Transfert en cours...';

  try {
    let nouveauNom = '';
    let nouveauUid = '';

    if (typeNouveau === 'existant') {
      // Résident existant
      const select = document.getElementById('t-residentsSelect');
      nouveauUid = select.value;
      if (!nouveauUid) { showToast('⚠️ Sélectionnez un résident', true); btn.disabled=false; btn.textContent='🔄 Confirmer le transfert'; return; }
      nouveauNom = select.options[select.selectedIndex].dataset.nom.trim();

      // Mettre à jour le lot de ce résident dans users
      await db.collection('users').doc(nouveauUid).update({
        lot: lot.numero,
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      });

    } else {
      // Nouveau résident à créer
      const prenom = document.getElementById('t-prenom').value.trim();
      const nom    = document.getElementById('t-nom').value.trim();
      const email  = document.getElementById('t-email').value.trim();
      const tel    = document.getElementById('t-tel').value.trim();
      const pwd    = document.getElementById('t-pwd').value;

      if (!prenom || !nom || !email || !pwd) {
        showToast('⚠️ Remplissez tous les champs obligatoires', true);
        btn.disabled=false; btn.textContent='🔄 Confirmer le transfert'; return;
      }

      nouveauNom = `${prenom} ${nom}`;

      // Créer le compte Firebase Auth avec app secondaire
      const secondApp = firebase.initializeApp(firebase.app().options, 'transfert_' + Date.now());
      const cred = await secondApp.auth().createUserWithEmailAndPassword(email, pwd);
      nouveauUid = cred.user.uid;
      await cred.user.updateProfile({ displayName: nouveauNom });

      await db.collection('users').doc(nouveauUid).set({
        prenom, nom, email, tel,
        profile:   'proprietaire',
        lot:       lot.numero,
        copro:     lot.copro || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdBy: currentUser.uid
      });

      await secondApp.auth().signOut();
      await secondApp.delete();
    }

    // Gérer l'ancien propriétaire
    if (actionAncien === 'supprimer' && lot.proprio) {
      const ancienSnap = await db.collection('users').where('lot','==', lot.numero).get();
      for (const doc of ancienSnap.docs) {
        if (doc.id !== nouveauUid) {
          await db.collection('users').doc(doc.id).update({ lot: '' });
        }
      }
    }

    // Mettre à jour le lot
    await db.collection('lots').doc(lotId).update({
      proprio:        nouveauNom,
      dateTransfert:  dateTransfert,
      ancienProprio:  lot.proprio || '',
    });

    // Historique dans Firestore
    await db.collection('historique_transferts').add({
      lotId, lotNumero: lot.numero,
      ancienProprio: lot.proprio || '—',
      nouveauProprio: nouveauNom,
      dateTransfert,
      createdBy: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    closeModal('transfertModal');
    showToast(`✅ Lot ${lot.numero} transféré à ${nouveauNom} !`);

  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': '⚠️ Cet email est déjà utilisé.',
      'auth/weak-password':        '⚠️ Mot de passe trop faible.',
      'auth/invalid-email':        '⚠️ Email invalide.',
    };
    showToast(msgs[e.code] || '❌ Erreur : ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '🔄 Confirmer le transfert';
  }
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.getElementById('lot-id').value='';
  document.getElementById('lotModalTitle').textContent='🏢 Nouveau lot';
  document.getElementById('btnLot').textContent='✅ Créer le lot';
}
async function handleLogout() { await auth.signOut(); window.location.href='login.html'; }
let toastTimer;
function showToast(msg,isErr=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(isErr?' error':'');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
