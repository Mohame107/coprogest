<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoproGest — Demandes d'adhésion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#0044a0;--card:#00368a;--card2:#004aab;--card3:#0055b3;
  --accent:#00d4aa;--accent2:#00b4d8;--accent3:#00d4aa;--accent4:#7dd3fc;
  --border:rgba(255,255,255,.12);--border2:rgba(0,180,216,.15);--border-hover:rgba(0,212,170,.5);
  --text:#ffffff;--text2:#e2f0ff;--muted:#b8d4f8;--muted2:#98c4f0;
  --danger:#f87171;--gold:#fbbf24;--success:#34d399;--purple:#a78bfa;
  --grad-main:linear-gradient(135deg,#00d4aa,#00b4d8);
  --grad-accent:linear-gradient(135deg,#00d4aa 0%,#0ea5e9 100%);
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Plus Jakarta Sans',sans-serif;
  --shadow-accent:0 4px 20px rgba(0,212,170,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 0;z-index:50;}
.sidebar-footer{margin-top:auto;padding:1.5rem;border-top:1px solid var(--border);}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1.5rem;color:var(--muted);font-size:.88rem;transition:all .2s;border-left:2px solid transparent;text-decoration:none;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--text);background:rgba(255,255,255,.06);border-left-color:var(--accent);}
.nav-icon{font-size:1.1rem;width:20px;text-align:center;}
.btn-logout{width:100%;padding:.6rem;border-radius:8px;border:1px solid rgba(255,107,107,.3);background:rgba(255,107,107,.08);color:#ff9999;font-family:'Plus Jakarta Sans',sans-serif;font-size:.83rem;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-logout:hover{background:rgba(255,107,107,.15);}
.main{margin-left:240px;padding:2rem 2.5rem;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.page-header h1{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.6rem;}
.page-header p{color:var(--muted);font-size:.92rem;margin-top:.3rem;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:800;}
.stat-lbl{color:var(--muted);font-size:.78rem;margin-top:.2rem;}
.tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;background:var(--card);padding:.4rem;border-radius:10px;width:fit-content;}
.tab-btn{padding:.55rem 1.2rem;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:600;}
.demandes-list{display:flex;flex-direction:column;gap:1rem;}
.demande-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.4rem;animation:fadeUp .3s ease both;transition:border-color .2s;}
.demande-card:hover{border-color:rgba(0,212,170,.3);}
.demande-card.en_attente{border-left:4px solid var(--gold);}
.demande-card.approuve{border-left:4px solid var(--accent3);}
.demande-card.refuse{border-left:4px solid var(--danger);}
.demande-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;}
.demande-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;}
.badge{display:inline-flex;padding:.25rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;}
.badge-attente{background:rgba(255,209,102,.12);color:var(--gold);}
.badge-approuve{background:rgba(56,217,169,.12);color:var(--accent3);}
.badge-refuse{background:rgba(255,107,107,.12);color:var(--danger);}
.demande-info{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem;}
.info-item{font-size:.84rem;}
.info-label{color:var(--muted);font-size:.75rem;margin-bottom:.15rem;}
.info-value{color:var(--text);}
.demande-message{background:var(--card2);border-radius:8px;padding:.8rem 1rem;font-size:.84rem;color:var(--muted);margin-bottom:1rem;line-height:1.6;}
.demande-actions{display:flex;gap:.6rem;flex-wrap:wrap;}
.btn-approve{padding:.55rem 1.2rem;border-radius:8px;border:1px solid rgba(56,217,169,.3);background:rgba(56,217,169,.1);color:var(--accent3);font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-approve:hover{background:rgba(56,217,169,.2);}
.btn-refuse{padding:.55rem 1.2rem;border-radius:8px;border:1px solid rgba(255,107,107,.2);background:transparent;color:var(--danger);font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-refuse:hover{background:rgba(255,107,107,.1);}
.btn-create-account{padding:.55rem 1.2rem;border-radius:8px;border:none;background:linear-gradient(135deg,#00d4aa,#0ea5e9);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-create-account:hover{opacity:.85;}
.demande-date{font-size:.76rem;color:var(--muted);}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4;}
.empty-state h3{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;color:var(--text);margin-bottom:.5rem;}
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem;}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{color:var(--muted);font-size:.9rem;}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:1000;background:var(--card2);border:1px solid var(--border);border-left:4px solid var(--accent3);border-radius:12px;padding:1rem 1.4rem;font-size:.88rem;color:var(--text);box-shadow:0 10px 40px rgba(0,0,0,.4);transform:translateX(120%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-width:320px;}
.toast.show{transform:translateX(0);}
.toast.error{border-left-color:var(--danger);}
/* Modal création compte */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:1rem;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal-box{transform:translateY(0);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.modal-header h2{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.15rem;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.form-label{font-size:.75rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.form-input,.form-select{width:100%;padding:.8rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;transition:border-color .2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
.form-select option{background:var(--card2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.btn-submit{width:100%;padding:.88rem;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4aa,#0ea5e9);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;padding:1.5rem;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="loading-screen" id="ls"><div class="spinner"></div><div class="loading-text">Chargement...</div></div>

<aside class="sidebar" id="sidebar" style="display:none"></aside>

<main class="main" id="mainContent" style="display:none">
  <div class="page-header">
    <div>
      <h1>📨 Demandes d'adhésion</h1>
      <p>Gérez les demandes des futurs copropriétaires</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-val" id="stTotal">0</div><div class="stat-lbl">Total demandes</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--gold)" id="stAttente">0</div><div class="stat-lbl">En attente</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--accent3)" id="stApprouve">0</div><div class="stat-lbl">Approuvées</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--danger)" id="stRefuse">0</div><div class="stat-lbl">Refusées</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('en_attente',this)">⏳ En attente</button>
    <button class="tab-btn" onclick="setTab('approuve',this)">✅ Approuvées</button>
    <button class="tab-btn" onclick="setTab('refuse',this)">❌ Refusées</button>
    <button class="tab-btn" onclick="setTab('all',this)">Toutes</button>
  </div>

  <div class="demandes-list" id="demandesList"></div>
</main>

<!-- MODAL CRÉATION COMPTE -->
<div class="modal-overlay" id="createModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>✅ Créer le compte</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="m-demandeId">
    <div class="form-group">
      <label class="form-label">Prénom *</label>
      <input type="text" class="form-input" id="m-prenom" placeholder="Jean">
    </div>
    <div class="form-group">
      <label class="form-label">Nom *</label>
      <input type="text" class="form-input" id="m-nom" placeholder="Dupont">
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" class="form-input" id="m-email" placeholder="jean@exemple.fr">
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input type="tel" class="form-input" id="m-tel" placeholder="+253 77 XX XX XX">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Lot</label>
        <input type="text" class="form-input" id="m-lot" placeholder="A012">
      </div>
      <div class="form-group">
        <label class="form-label">Profil *</label>
        <select class="form-select" id="m-profile">
          <option value="proprietaire">🏠 Copropriétaire</option>
          <option value="conseil">⚖️ Conseil Syndical</option>
          <option value="locataire">🔑 Locataire</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe temporaire *</label>
      <input type="text" class="form-input" id="m-pwd" placeholder="Ex: Copro2026!" value="Copro2026!">
    </div>
    <div style="background:rgba(56,217,169,.08);border:1px solid rgba(56,217,169,.2);border-radius:8px;padding:.8rem 1rem;font-size:.82rem;color:var(--muted);margin-bottom:1rem;">
      ℹ️ Le compte sera créé avec ce mot de passe temporaire. L'utilisateur pourra le modifier depuis son profil.
    </div>
    <button class="btn-submit" id="btnCreate" onclick="creerCompte()">✅ Créer le compte</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="sidebar.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init('ayGABGXa0pHYR5wGt');
const EMAILJS_SERVICE  = 'service_r4mqekz';
const EMAILJS_TPL_DEC  = 'template_7e4ycrd';
let currentUser = null;
let allDemandes = [];
let currentTab = 'en_attente';

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  try {
    const snap = await db.collection('users').doc(user.uid).get();
    const data = snap.exists ? snap.data() : {};
    if (data.profile !== 'syndic') {
      window.location.href = 'dashboard.html'; return;
    }
    const name = data.prenom ? `${data.prenom} ${data.nom||''}`.trim() : user.displayName || 'Syndic';
    buildSidebar('syndic', name, user.email, 'demandes.html');
  } catch(e) {}

  document.getElementById('ls').style.display = 'none';
  document.getElementById('sidebar').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'block';
  loadDemandes();
});

function loadDemandes() {
  db.collection('demandes').orderBy('createdAt','desc').onSnapshot(snap => {
    allDemandes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderDemandes();
  });
}

function updateStats() {
  document.getElementById('stTotal').textContent   = allDemandes.length;
  document.getElementById('stAttente').textContent  = allDemandes.filter(d=>d.statut==='en_attente').length;
  document.getElementById('stApprouve').textContent = allDemandes.filter(d=>d.statut==='approuve').length;
  document.getElementById('stRefuse').textContent   = allDemandes.filter(d=>d.statut==='refuse').length;
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDemandes();
}

function renderDemandes() {
  let list = allDemandes;
  if (currentTab !== 'all') list = list.filter(d => d.statut === currentTab);

  const container = document.getElementById('demandesList');

  if (list.length === 0) {
    const msgs = {
      en_attente: 'Aucune demande en attente',
      approuve:   'Aucune demande approuvée',
      refuse:     'Aucune demande refusée',
      all:        'Aucune demande reçue'
    };
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📨</div><h3>${msgs[currentTab]}</h3><p>Les nouvelles demandes apparaîtront ici automatiquement.</p></div>`;
    return;
  }

  const badgeMap = { en_attente: ['badge-attente','⏳ En attente'], approuve: ['badge-approuve','✅ Approuvée'], refuse: ['badge-refuse','❌ Refusée'] };

  container.innerHTML = list.map((d, i) => {
    const date = d.createdAt?.toDate ? d.createdAt.toDate().toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' }) : '—';
    const [badgeCls, badgeLabel] = badgeMap[d.statut] || ['badge-attente','—'];

    const actions = d.statut === 'en_attente' ? `
      <button class="btn-approve" onclick="ouvrirModal('${d.id}')">✅ Approuver & créer le compte</button>
      <button class="btn-refuse" onclick="refuserDemande('${d.id}')">❌ Refuser</button>
    ` : d.statut === 'approuve' ? `
      <span style="font-size:.8rem;color:var(--accent3)">✅ Compte créé le ${date}</span>
    ` : `
      <button class="btn-approve" onclick="ouvrirModal('${d.id}')" style="font-size:.8rem">↩️ Réapprouver</button>
    `;

    return `<div class="demande-card ${d.statut}" style="animation-delay:${i*.06}s">
      <div class="demande-header">
        <div>
          <div class="demande-name">${d.nom || '—'}</div>
          <div class="demande-date">📅 ${date}</div>
        </div>
        <span class="badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="demande-info">
        <div class="info-item"><div class="info-label">Email</div><div class="info-value">${d.email||'—'}</div></div>
        <div class="info-item"><div class="info-label">Téléphone</div><div class="info-value">${d.tel||'—'}</div></div>
        <div class="info-item"><div class="info-label">Lot / Appartement</div><div class="info-value">${d.lot||'—'}</div></div>
        <div class="info-item"><div class="info-label">Statut</div><div class="info-value"><span class="badge ${badgeCls}">${badgeLabel}</span></div></div>
      </div>
      ${d.message ? `<div class="demande-message">💬 ${d.message}</div>` : ''}
      <div class="demande-actions">${actions}</div>
    </div>`;
  }).join('');
}

// ── Ouvrir modal création compte ──
function ouvrirModal(id) {
  const d = allDemandes.find(x => x.id === id);
  if (!d) return;

  document.getElementById('m-demandeId').value = id;
  // Pré-remplir avec les données de la demande
  const parts = (d.nom || '').split(' ');
  document.getElementById('m-prenom').value = parts[0] || '';
  document.getElementById('m-nom').value    = parts.slice(1).join(' ') || '';
  document.getElementById('m-email').value  = d.email || '';
  document.getElementById('m-tel').value    = d.tel || '';
  document.getElementById('m-lot').value    = d.lot || '';
  document.getElementById('createModal').classList.add('show');
}

// ── Créer le compte Firebase ──
async function creerCompte() {
  const demandeId = document.getElementById('m-demandeId').value;
  const prenom    = document.getElementById('m-prenom').value.trim();
  const nom       = document.getElementById('m-nom').value.trim();
  const email     = document.getElementById('m-email').value.trim();
  const tel       = document.getElementById('m-tel').value.trim();
  const lot       = document.getElementById('m-lot').value.trim();
  const profile   = document.getElementById('m-profile').value;
  const pwd       = document.getElementById('m-pwd').value;

  if (!prenom || !nom || !email || !pwd) {
    showToast('⚠️ Remplissez tous les champs obligatoires', true); return;
  }

  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = 'Création en cours...';

  try {
    // Créer le compte Firebase Auth avec une app secondaire
    const secondaryApp = firebase.initializeApp(firebase.app().options, 'secondary_' + Date.now());
    const secondaryAuth = secondaryApp.auth();
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pwd);
    await cred.user.updateProfile({ displayName: `${prenom} ${nom}` });

    // Sauvegarder le profil dans Firestore
    await db.collection('users').doc(cred.user.uid).set({
      prenom, nom, email, tel, lot, profile,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: currentUser.uid
    });

    // Mettre à jour le statut de la demande
    await db.collection('demandes').doc(demandeId).update({
      statut: 'approuve',
      approuveAt: firebase.firestore.FieldValue.serverTimestamp(),
      compteUid: cred.user.uid
    });

    await secondaryAuth.signOut();
    await secondaryApp.delete();

    // Envoyer email de notification d'approbation
    try {
      const syndicSnap = await db.collection('users').doc(currentUser.uid).get();
      const syndicNom  = syndicSnap.exists ? `${syndicSnap.data().prenom||''} ${syndicSnap.data().nom||''}`.trim() : 'Le Syndic';
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TPL_DEC, {
        email_destinataire: email,
        prenom: prenom,
        message: '🎉 Félicitations ! Votre demande d\'adhésion à la copropriété a été ACCEPTÉE.',
        instructions: `Votre compte a été créé avec les informations suivantes :\n\n• Email : ${email}\n• Mot de passe temporaire : ${pwd}\n• Profil : ${profile}\n\nConnectez-vous sur : https://coprogest-effcb.web.app/login.html\n\nNous vous recommandons de changer votre mot de passe après la première connexion.`,
        syndic_nom: syndicNom
      });
    } catch(emailErr) {
      console.warn('Email notification failed:', emailErr);
    }

    closeModal();
    showToast(`✅ Compte créé pour ${prenom} ${nom} ! Email de confirmation envoyé.`);
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': '⚠️ Cet email est déjà utilisé.',
      'auth/weak-password':        '⚠️ Mot de passe trop faible (min. 6 caractères).',
      'auth/invalid-email':        '⚠️ Email invalide.',
    };
    showToast(msgs[e.code] || '❌ Erreur : ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '✅ Créer le compte';
  }
}

// ── Refuser une demande ──
async function refuserDemande(id) {
  if (!confirm('Refuser cette demande ?')) return;
  const demande = allDemandes.find(d => d.id === id);

  await db.collection('demandes').doc(id).update({
    statut: 'refuse',
    refuseAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  // Envoyer email de notification de refus
  if (demande?.email) {
    try {
      const syndicSnap = await db.collection('users').doc(currentUser.uid).get();
      const syndicNom  = syndicSnap.exists ? `${syndicSnap.data().prenom||''} ${syndicSnap.data().nom||''}`.trim() : 'Le Syndic';
      const prenom = (demande.nom||'').split(' ')[0] || 'Madame/Monsieur';
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TPL_DEC, {
        email_destinataire: demande.email,
        prenom: prenom,
        message: 'Nous avons bien reçu votre demande d\'adhésion à la copropriété. Après examen de votre dossier, nous sommes dans le regret de vous informer que votre demande n\'a pas pu être acceptée à ce stade.',
        instructions: 'Pour plus d\'informations sur les raisons de ce refus ou pour soumettre un nouveau dossier, veuillez contacter le Syndic directement par téléphone ou par email.',
        syndic_nom: syndicNom
      });
      showToast('Demande refusée. Email de notification envoyé.');
    } catch(e) {
      showToast('Demande refusée. (Email non envoyé)');
    }
  } else {
    showToast('Demande refusée.');
  }
}

function closeModal() { document.getElementById('createModal').classList.remove('show'); }
async function handleLogout() { await auth.signOut(); window.location.href = 'login.html'; }

let toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show'+(isErr?' error':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 4000);
}
</script>
